<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좀비 아포칼립스 생존 시뮬레이터</title>
    <style>
        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-ExtraLight.woff') format('woff');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-Light.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-Regular.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-Text.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-Medium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'IbmPlexSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-07@1.0/IBMPlexSansKR-SemiBold.woff') format('woff');
            font-weight: 600;
            font-display: swap;
        }

        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --panel-bg: rgba(30, 30, 30, 0.8);
            --text-color: #d1d1d1;
            --accent-color: #e74c3c;
            --success-color: #2ed573;
            --info-color: #3498db;
            --border-color: #333;
            --terminal-green: #2ecc71;
        }

        body {
            font-family: 'IbmPlexSans', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1600px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        h1, h2, h3, h4 { 
            color: var(--accent-color); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 0;
        }

        /* 인트로 패널 */
        .intro-panel {
            flex: 1;
            background: radial-gradient(circle at center, #2c0000 0%, #050505 100%);
            padding: 50px;
            border-radius: 10px;
            border: 1px solid #4a0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            max-width: 900px;
            margin: auto;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 150px #000, 0 0 40px rgba(0, 0, 0, 0.9);
            transition: all 0.5s ease;
        }

        /* 학교 선택 시 칠판 테마 */
        .intro-panel.theme-school {
            background: #1b4d3e; /* 칠판 초록색 */
            border: 15px solid #5d4037; /* 나무 프레임 */
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
        }
        .intro-panel.theme-school::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15; /* 분필 가루 느낌 */
            pointer-events: none;
            z-index: 1;
        }
        .intro-panel.theme-school h1 {
            color: #fff;
            font-family: 'DungGeunMo', 'IbmPlexSans', sans-serif;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }

        .intro-panel > * { position: relative; z-index: 2; }

        .intro-step {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-text { font-size: 1.2em; margin-bottom: 30px; color: #bbb; max-width: 700px; }
        .intro-loc-select { width: 300px; margin-bottom: 20px; }

        /* 카드 선택 시스템 */
        .selection-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
            justify-content: center;
        }

        .selection-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .selection-card:hover {
            border-color: var(--info-color);
            background: rgba(52, 152, 219, 0.1);
            transform: translateY(-5px);
        }

        .selection-card.active {
            border-color: var(--accent-color);
            background: rgba(231, 76, 60, 0.1);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        .card-title { font-weight: 600; font-size: 1.1em; color: #fff; }
        .card-desc { font-size: 0.8em; color: #aaa; text-align: center; line-height: 1.4; }

        /* 설정 영역 */
        .setup-panel {
            width: 100%;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--info-color);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.2);
            overflow-y: auto;
            display: flex;
            gap: 30px;
        }

        .setup-left { flex: 2; }
        .setup-right { flex: 1; border-left: 1px solid #444; padding-left: 30px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .survival-rate-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border: 1px dashed var(--terminal-green);
            margin-top: 20px;
            text-align: center;
            color: var(--terminal-green);
        }

        #statsInputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .stat-slider input { flex-grow: 1; }
        .stat-value { font-family: monospace; color: var(--terminal-green); margin-left: 5px; font-weight: bold; }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn-add { background: linear-gradient(to bottom, #3498db, #2980b9); color: white; }
        .btn-start { 
            background: linear-gradient(135deg, #8b0000 0%, #e74c3c 50%, #8b0000 100%); 
            background-size: 200% auto;
            color: white; 
            font-size: 1.1em; 
            margin-top: 20px; 
            border: 1px solid #5c0000;
            animation: urgent-glow 2s infinite;
        }
        @keyframes urgent-glow {
            0% { box-shadow: 0 0 5px rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.8); }
            100% { box-shadow: 0 0 5px rgba(231, 76, 60, 0.4); }
        }
        .btn-delete { background: #555; color: white; padding: 5px; font-size: 0.8em; margin: 0; width: auto; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* 시뮬레이션 영역 */
        .sim-panel {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: 1fr auto;
            gap: 20px;
            height: 100%;
        }

        .status-board {
            grid-column: 1;
            grid-row: 1 / 3;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .relationship-board {
            grid-column: 3;
            grid-row: 1 / 3;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .char-card {
            background: #252525;
            padding: 12px;
            border-radius: 6px;
            border-left: 5px solid var(--accent-color);
            font-size: 0.85em;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .char-card.dead { border-color: #333; opacity: 0.5; grayscale: 1; }
        .char-card.escaped { border-color: var(--success-color); box-shadow: 0 0 10px rgba(46, 213, 115, 0.2); }

        .stat-bar-container { width: 100%; background: #111; height: 6px; border-radius: 3px; margin: 4px 0 8px 0; overflow: hidden; }
        .stat-bar { height: 100%; transition: width 0.5s ease; }

        .log-window {
            grid-column: 2;
            grid-row: 1;
            background: #121212;
            padding: 25px;
            border-radius: 8px;
            overflow-y: auto;
            font-family: 'Pretendard', sans-serif;
            border: 1px solid #222;
            color: #bbb;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-entry {
            background: #1a1a1a;
            border-left: 4px solid #444;
            padding: 15px;
            border-radius: 4px;
            animation: fadeIn 0.3s ease-out;
        }

        .log-entry.zombie { border-left-color: var(--accent-color); background: rgba(231, 76, 60, 0.05); }
        .log-entry.search { border-left-color: var(--info-color); }
        .log-entry.rest { border-left-color: var(--success-color); }
        .log-entry.system { border-left: none; background: #000; text-align: center; color: #f1c40f; font-weight: bold; }

        .log-day-tag { font-size: 1.5em; color: #f1c40f; margin: 20px 0 10px 0; font-weight: 800; border-bottom: 2px solid #f1c40f; display: inline-block; }
        .log-char-name { font-size: 1.1em; font-weight: bold; color: #3498db; margin-bottom: 5px; display: block; }
        .log-situation { color: #eee; margin-bottom: 5px; font-size: 1em; }
        .log-dialogue { color: #f1c40f; font-style: italic; margin: 8px 0; padding-left: 10px; border-left: 2px solid #f1c40f; font-size: 0.95em; }
        .log-result { font-weight: bold; margin-top: 5px; }
        .log-calc { font-size: 0.8em; color: #666; font-style: italic; margin-top: 3px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .control-area {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            justify-content: flex-end;
        }

        .hidden { display: none !important; }
        
        .char-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a2a2a;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        strong {
            font-weight: 600; /* SemiBold 적용 */
            color: #ffffff;  /* 일반 텍스트(#bbb)보다 밝게 설정하여 강조 */
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <!-- 인트로 패널 -->
    <div class="intro-panel" id="introPanel">
        <h1>좀비 아포칼립스 시뮬레이터</h1>
        
        <!-- 장소 선택 단계 -->
        <div id="stepLocation" class="intro-step">
            <h2 style="margin-bottom: 30px; font-size: 1.2em; color: #fff;">어디서 생존을 시작하시겠습니까?</h2>
            <div class="selection-grid">
                <div class="selection-card active" onclick="selectLocation('school', this)">
                    <div class="card-title">🏫 학교</div>
                    <div class="card-desc">은신 +10%<br>식량 -20%</div>
                </div>
                <div class="selection-card" onclick="selectLocation('subway', this)">
                    <div class="card-title">🚇 지하철</div>
                    <div class="card-desc">좀비 조우 +30%<br>탈출 확률 +15%</div>
                </div>
                <div class="selection-card" onclick="selectLocation('apartment', this)">
                    <div class="card-title">🏢 아파트</div>
                    <div class="card-desc">식량 획득 +30%<br>은신 +20%</div>
                </div>
            </div>
            <button class="btn btn-start" style="width: 320px;" onclick="proceedToDifficulty()">장소 확정 및 다음 단계 →</button>
        </div>

        <!-- 난이도 선택 단계 -->
        <div id="stepDifficulty" class="intro-step hidden">
            <h2 style="margin-bottom: 30px; font-size: 1.2em; color: #fff;">생존 난이도를 선택하십시오</h2>
            <div class="selection-grid">
                <div class="selection-card" onclick="selectDifficulty(-10, this)">
                    <div class="card-title" style="color: var(--success-color);">쉬움</div>
                    <div class="card-desc">상대적으로 안전함</div>
                </div>
                <div class="selection-card active" onclick="selectDifficulty(0, this)">
                    <div class="card-title" style="color: var(--info-color);">보통</div>
                    <div class="card-desc">표준적인 위협</div>
                </div>
                <div class="selection-card" onclick="selectDifficulty(20, this)">
                    <div class="card-title" style="color: #f1c40f;">어려움</div>
                    <div class="card-desc">매우 위험함</div>
                </div>
                <div class="selection-card" onclick="selectDifficulty(40, this)">
                    <div class="card-title" style="color: var(--accent-color);">지옥</div>
                    <div class="card-desc">절망적인 상황</div>
                </div>
            </div>
            <button id="setupTriggerBtn" class="btn btn-start" style="width: 320px;" onclick="goToSetup()">난이도 확정 및 캐릭터 설정 →</button>
        </div>
    </div>

    <!-- 좌측 설정 패널 -->
    <div class="setup-panel hidden" id="setupPanel">
        <div class="setup-left">
            <h2>👥 대원 모집 및 상태 설정</h2>
            <div id="charInputs">
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 3;">
                        <label>이름</label>
                        <div style="display: flex; gap: 5px;">
                        <input type="text" id="inputName" placeholder="캐릭터 이름">
                        <button class="btn" style="margin: 0; width: 120px; font-size: 0.8em; background: #555;" onclick="generateRandomName()">🎲 이름 생성</button>
                        </div>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>성별 / 나이</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="inputGender">
                                <option value="男">男 (남)</option>
                                <option value="女">女 (여)</option>
                            </select>
                            <input type="number" id="inputAge" value="25" min="1" max="100">
                        </div>
                    </div>
                </div>
                <div id="statsInputs"></div>
                
                <div class="input-group" style="margin-top: 15px;">
                    <label style="font-size: 0.8em; color: #888;">성격 유형 (MBTI)</label>
                    <div style="display: flex; gap: 5px;">
                        <select id="mbti-ie" style="padding: 4px; font-size: 0.8em;">
                            <option value="I">I (내향)</option>
                            <option value="E">E (외향)</option>
                        </select>
                        <select id="mbti-sn" style="padding: 4px; font-size: 0.8em;">
                            <option value="S">S (감각)</option>
                            <option value="N">N (직관)</option>
                        </select>
                        <select id="mbti-tf" style="padding: 4px; font-size: 0.8em;">
                            <option value="T">T (사고)</option>
                            <option value="F">F (감정)</option>
                        </select>
                        <select id="mbti-jp" style="padding: 4px; font-size: 0.8em;">
                            <option value="J">J (판단)</option>
                            <option value="P">P (인식)</option>
                        </select>
                    </div>
                </div>

                <div class="survival-rate-box">
                    <div id="survivalRateDisplay">예상 생존율: 50%</div>
                    <div style="font-size: 0.7em; margin-top: 5px; opacity: 0.7;">* 모든 능력치의 평균과 가중치를 기반으로 산출된 값입니다.</div>
                </div>
                <button class="btn" style="background: #444; margin-top: 15px;" onclick="randomizeStats()">🎲 랜덤 스탯 설정</button>
                <button class="btn btn-add" onclick="addCharacter()">분대에 추가 (+)</button>
            </div>
        </div>

        <div class="setup-right">
            <h3>🛡️ 현재 분대원</h3>
            <div id="groupList" style="min-height: 200px;"></div>
            <button class="btn btn-start" id="startBtn" onclick="startSimulation()">작전 시작 (Start)</button>
        </div>
    </div>

    <!-- 우측 시뮬레이션 패널 -->
    <div class="sim-panel hidden" id="simPanel">
        <div class="status-board" id="statusBoard"></div>
        <div class="log-window" id="logWindow"></div>
        <div class="relationship-board" id="relationshipBoard"></div>
        <div class="control-area">
            <button class="btn btn-start" id="nextDayBtn" style="width: 250px;" onclick="processDay()">다음 날 진행 (Next Day) →</button>
        </div>
    </div>
</div>

<script>
    // --- 데이터 정의 ---
    const STAT_NAMES = [
        "시력", "청력", "체력", "면역력", "근력", "속도", 
        "순발력", "지능", "행동력", "정신력", "인내력", "사교성", "판단력"

    const SoundManager = {
        audioCtx: null,
        heartbeatTimeout: null,
        currentFear: 0,
        isProcessing: false,

        init() {
            // 오디오 컨텍스트는 사용자 제스처(클릭 등) 이후에만 생성 가능
            if (!this.audioCtx) {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },

        playHeartbeat() {
            this.init();
            this.stopHeartbeat(); // 기존 심장 박동을 멈추고 새로 시작
            const playTick = () => {
                if (!gameActive && this.heartbeatTimeout) return;
                
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(50 + (this.currentFear / 2), this.audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.15, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                
                osc.start();
                osc.stop(this.audioCtx.currentTime + 0.1);

                // 공포도에 따라 인터벌 계산 (0~100 -> 1200ms~250ms)
                const nextTick = 1200 - (this.currentFear * 9.5);
                this.heartbeatTimeout = setTimeout(playTick, Math.max(250, nextTick)); // 최소 250ms 간격
            };
            playTick();
        },
        stopHeartbeat() {
            clearTimeout(this.heartbeatTimeout);
            this.heartbeatTimeout = null;
        },

        playAlert() {
            this.init();
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, this.audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(880, this.audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.start();
            osc.stop(this.audioCtx.currentTime + 0.3);
        },

        playSuccess() {
            this.init();
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, this.audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1320, this.audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.start();
            osc.stop(this.audioCtx.currentTime + 0.5);
        },

        playDayChange() {
            this.init();
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = 'triangle'; // 부드러운 톤
            osc.frequency.setValueAtTime(300, this.audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, this.audioCtx.currentTime + 0.2); // 살짝 상승하는 톤
            gain.gain.setValueAtTime(0.08, this.audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime + 0.3);

            gain.connect(this.audioCtx.destination);
            osc.start();
            osc.stop(this.audioCtx.currentTime + 0.3);
        },

    };

    function setToggle(el, type, value) {
        setupState[type] = value;

    function randomizeMbti() {
        const types = { ie: ['I', 'E'], sn: ['S', 'N'], tf: ['T', 'F'], jp: ['J', 'P'] };
        Object.keys(types).forEach(type => {
            const val = types[type][Math.floor(Math.random() * 2)];
            const group = document.querySelector(`.mbti-toggle[data-type="${type}"]`);
            const items = group.querySelectorAll('.toggle-item');
            const target = Array.from(items).find(item => item.innerText === val);
            setToggle(target, type, val);
        });
    }

    }

    function updateSurvivalRate() {
        let total = 0;
        STAT_NAMES.forEach(stat => {
            const el = document.getElementById(`stat-${stat}`);
            if (el) total += parseInt(el.value);
        });
        // MBTI 가중치 계산 시 setupState 사용
        const avg = total / STAT_NAMES.length;
        const rate = Math.min(99, Math.round(20 + (avg * 7)));
        const display = document.getElementById('survivalRateDisplay');
        if (display) {
            display.innerText = `예상 생존율: ${rate}%`;
            display.style.color = rate > 70 ? 'var(--success-color)' : (rate > 40 ? 'var(--terminal-green)' : 'var(--accent-color)');
        }
    }

    function startTypingEffect() {
        const introText = document.getElementById('introText');
        const fullText = introText.innerHTML;
        introText.innerHTML = '';
        
        let index = 0;
        let currentHTML = '';
        function type() {
            if (index < fullText.length) {
                if (fullText[index] === '<') {
                    let tagEnd = fullText.indexOf('>', index);
                    currentHTML += fullText.substring(index, tagEnd + 1);
                    index = tagEnd + 1;
                    type(); // 태그는 대기 시간 없이 즉시 처리
                    return;
                } else {
                    currentHTML += fullText[index];
                    index++;
                }
                introText.innerHTML = currentHTML;
                setTimeout(type, 35);
            } else {
                document.getElementById('setupTriggerBtn').classList.add('visible');
            }
        }
        type();
    }

            mbti: setupState.ie + setupState.sn + setupState.tf + setupState.jp // MBTI 유형 저장
        };

        characters.push(newChar);
        updateGroupList();
        document.getElementById('inputName').value = '';
    }

    function updateGroupList() {
        const list = document.getElementById('groupList');
        list.innerHTML = '';
        characters.forEach(c => {
            const item = document.createElement('div');
            item.className = 'char-list-item';

                <span>${c.name} (${c.gender}/${c.age})</span>
                <button class="btn-delete" onclick="removeChar(${c.id})">삭제</button>
            `;

    function removeChar(id) {
        characters = characters.filter(c => c.id !== id);
        updateGroupList();
    }

    function goToSetup() {
        SoundManager.playHeartbeat();
        document.getElementById('introPanel').classList.add('hidden');
        document.getElementById('setupPanel').classList.remove('hidden');
    }

    function log(html) {
        const win = document.getElementById('logWindow');
        const temp = document.createElement('div');
        temp.innerHTML = html.trim();
        const el = temp.firstChild;
        win.appendChild(el);
        win.scrollTop = win.scrollHeight;
        return el;
    }

    function getDialogue(type, char) {
        const mbti = char.mbti;
        const traits = mbti.split('');
        // 캐릭터의 특성 중 하나를 무작위로 선택하여 대사 풀 결정
        const selectedTrait = traits[Math.floor(Math.random() * traits.length)];
        const pool = DIALOGUES[type][selectedTrait] || DIALOGUES[type]["default"];
        return `"${pool[Math.floor(Math.random() * pool.length)]}"`;
    }

    function applyEffect(char, name, baseDuration, target, mod) {
        let duration = baseDuration;
        const mbti = char.mbti;

        // MBTI 기반 저항력/취약점 로직
        if (name === "골절 부상") {
            if (mbti.includes('S')) duration -= 1; // 신체 감각 발달로 빠른 회복
            if (mbti.includes('J')) duration += 1; // 경직된 대처로 회복 지연
        } else if (name === "식중독") {
            if (mbti.includes('T')) duration -= 1; // 이성적인 자기 관리
        } else if (name === "정신적 충격") {
            if (mbti.includes('P')) duration -= 1; // 높은 유연성과 적응력
            if (mbti.includes('F') || mbti.includes('N')) duration += 1; // 감수성 및 과잉 상상으로 악화
        }
        
        duration = Math.max(1, duration);
        char.effects.push({ name, duration, target, mod });
        return duration;
    }

    function calculateMbtiCompatibilityScore(mbti1, mbti2) {
        let score = 0; // Max 40 (all match), Min -20 (all opposite)
        for (let i = 0; i < 4; i++) {
            const char1Type = mbti1[i];
            const char2Type = mbti2[i];

            if (char1Type === char2Type) {
                score += 10; // Matching trait
            } else {
                score -= 5; // Opposite trait (slight friction)
            }
        }
        // Scale score to a modifier for trust (e.g., -20 to +20)
        // (score + 20) / 60 * 40 - 20 => maps -20..40 to -20..20
        // Simpler: just use score directly as a modifier, capped.
        return Math.max(-20, Math.min(20, score));
    }


    function getPsychEmoji(char) {
        if (char.states.fear > 80) return "😱"; // 패닉
        if (char.states.fear > 40) return "😰"; //불안
        if (char.states.hunger > 70 || char.states.thirst > 70) return "👿"; // 예민/분노
        if (char.states.fatigue > 60) return "😫"; // 지침
        return "😌"; // 평온
    }

    // --- 핵심 로직: 확률 계산 함수 (요구사항 7번) ---
    function calculateProbability(type, char, env) {
        let val = 0;
        let base = 0;
        let formula = "";

        // 원수 방해 로직: 생존한 대원 중 관계가 '원수'인 인원당 성공률 페널티
        let enemyPenalty = 0;
        const aliveEnemies = characters.filter(other => 
            other.id !== char.id && 
            other.states.status === 'alive' && 
            ((char.trust[other.id] || 50) + (other.trust[char.id] || 50)) / 2 < 20
        );
        
        if (aliveEnemies.length > 0) {
            enemyPenalty = aliveEnemies.length * 8; // 원수 1명당 8% 확률 감소
        }

        // 동료 보너스: 관계가 '절친'인 대원당 성공률 보너스
        let friendBonus = 0;
        const aliveFriends = characters.filter(other => 
            other.id !== char.id && 
            other.states.status === 'alive' && 
            ((char.trust[other.id] || 50) + (other.trust[char.id] || 50)) / 2 >= 80
        );
        friendBonus = aliveFriends.length * 5;

        // MBTI 기반 이벤트 성공 확률 보정
        let mbtiEventMod = 0;
        const charMbti = char.mbti;

        // 예시 영향 (확장 가능)
        if (charMbti.includes('I') && type === 'detect') mbtiEventMod += 5; // 내향형은 은신/탐지에 유리
        if (charMbti.includes('E') && type === 'conflict') mbtiEventMod += 5; // 외향형은 갈등 해결에 유리
        if (charMbti.includes('S') && type === 'search') mbtiEventMod += 3; // 감각형은 탐색에 실용적
        if (charMbti.includes('N') && type === 'move') mbtiEventMod += 3; // 직관형은 경로 탐색에 유리
        if (charMbti.includes('T') && type === 'combat') mbtiEventMod += 5; // 사고형은 전투 전략에 유리
        if (charMbti.includes('F') && type === 'coop') mbtiEventMod += 5; // 감정형은 협력에 유리
        if (charMbti.includes('J') && type === 'rest') mbtiEventMod += 3; // 판단형은 휴식 계획에 유리
        if (charMbti.includes('P') && type === 'escape') mbtiEventMod += 3; // 인식형은 도주 시 유연성 발휘

        if (mbtiEventMod !== 0) {
            val += mbtiEventMod;
            formula += ` + MBTI(${mbtiEventMod})`;
        }


        switch(type) {
            case 'detect':
                base = 30;
                val = base + (char.stats['청력'] * 4) + (char.stats['시력'] * 3) + env.stealthMod;
                formula = `30 + (청력:${char.stats['청력']}×4) + (시력:${char.stats['시력']}×3) + 환경:${env.stealthMod}`;
                break;
            case 'escape':
                base = 25;
                val = base + (char.stats['속도'] * 5) + (char.stats['순발력'] * 4) - (char.states.fatigue * 0.2) + env.escapeMod;
                formula = `25 + (속도:${char.stats['속도']}×5) + (순발력:${char.stats['순발력']}×4) - (피로:${char.states.fatigue.toFixed(1)}×0.2) + 환경:${env.escapeMod}`;
                break;
            case 'combat':
                base = 20;
                val = base + (char.stats['근력'] * 6) + (char.stats['체력'] * 3);
                formula = `20 + (근력:${char.stats['근력']}×6) + (체력:${char.stats['체력']}×3)`;
                break;
            case 'infection':
                base = 50;
                val = base - (char.stats['면역력'] * 5);
                formula = `50 - (면역:${char.stats['면역력']}×5)`;
                break;
            case 'conflict':
                base = 30;
                val = base + (char.stats['사교성'] * 5) + (char.stats['판단력'] * 3);
                formula = `30 + (사교:${char.stats['사교성']}×5) + (판단:${char.stats['판단력']}×3)`;
                break;
        }
        
        // 장기 지속 효과(Status Effects) 반영
        char.effects.forEach(e => {
            if (e.target === type || e.target === 'all') {
                val += e.mod;
                formula += ` + ${e.name}(${e.mod})`;
            }
        });

        // 원수 페널티 최종 적용
        if (enemyPenalty > 0) {
            val -= enemyPenalty;
            formula += ` - 원수 방해(-${enemyPenalty})`;
        }
        if (friendBonus > 0) {
            val += friendBonus;
            formula += ` + 동료 신뢰(+${friendBonus})`;
        }

        // 공포도 페널티 (공포 80 이상 시 성공률 20% 감소)
        if (char.states.fear >= 80) {
            val -= 20;
            formula += " - 패닉(-20)";
        }

        return { successChance: Math.max(0, Math.min(100, val)), formula };
    }

    // --- 시뮬레이션 엔진 ---
    async function startSimulation() {
        if (characters.length === 0) return alert("최소 한 명의 캐릭터가 필요합니다.");

        // 초기 신뢰도 설정
        characters.forEach(c1 => {
            // 난이도에 따른 초기 보급품(배고픔, 갈증) 설정
            // difficultyMod: -10(쉬움), 0(보통), 20(어려움), 40(지옥)
            let initialNeed = 0;
            if (difficultyMod <= -10) initialNeed = 0;
            else if (difficultyMod === 0) initialNeed = 15;
            else if (difficultyMod === 20) initialNeed = 40;
            else if (difficultyMod === 40) initialNeed = 65;

            c1.states.hunger = initialNeed;
            c1.states.thirst = initialNeed;
            c1.states.hp = 100;
            c1.states.fatigue = initialNeed / 2;

            characters.forEach(c2 => {
                if (c1.id !== c2.id) {
                    const mbtiMod = calculateMbtiCompatibilityScore(c1.mbti, c2.mbti);
                    c1.trust[c2.id] = Math.max(0, Math.min(100, 50 + mbtiMod)); // 기본 50 + MBTI 보정
                }
            });
        });

        document.getElementById('setupPanel').classList.add('hidden');
        document.getElementById('simPanel').classList.remove('hidden');
        gameActive = true;
        
        log(`<div class="log-entry system">📍 시뮬레이션 시작: ${selectedLoc.name}</div>`);
        await processDay();
    }

            const hpColor = c.states.hp > 50 ? 'var(--success-color)' : (c.states.hp > 20 ? '#f1c40f' : 'var(--accent-color)');
            const infColor = c.states.infection > 50 ? 'var(--accent-color)' : '#9b59b6';

                `<div style="margin-top:5px; color:#e67e22; font-size:0.75em;">🔸 ${c.effects.map(e => `${e.name}(${e.duration}d)`).join(', ')}</div>` : '';

                </div>

                <div style="font-size:0.85em;">

                    INFECTION
                    <div class="stat-bar-container"><div class="stat-bar" style="width:${c.states.infection}%; background:${infColor};"></div></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:8px; font-size:0.8em; color:#bbb;">
                    <div>🍖 배고픔: ${Math.ceil(c.states.hunger)}</div>
                    <div>😫 피로도: ${Math.ceil(c.states.fatigue)}</div>

    function updateRelationshipBoard() {
        const relBoard = document.getElementById('relationshipBoard');
        relBoard.innerHTML = ''; // 제목 제거
        
        const aliveChars = characters.filter(c => c.states.status === 'alive');

        for (let i = 0; i < aliveChars.length; i++) {
            for (let j = i + 1; j < aliveChars.length; j++) {
                const charA = aliveChars[i];
                const charB = aliveChars[j];

                // 두 캐릭터 간 신뢰도의 평균값 계산
                const trustVal = Math.round(((charA.trust[charB.id] || 50) + (charB.trust[charA.id] || 50)) / 2);
                const mbtiScore = calculateMbtiCompatibilityScore(charA.mbti, charB.mbti);

                let statusText = "😐 보통";
                let color = "#aaa";
                if (trustVal < 20) { statusText = "💀 원수"; color = "var(--accent-color)"; }
                else if (trustVal < 40) { statusText = "😒 소원"; color = "#ffa502"; }
                else if (trustVal < 60) { statusText = "😐 보통"; color = "#aaa"; }
                else if (trustVal < 80) { statusText = "😊 친구"; color = "var(--terminal-green)"; }
                else { statusText = "🤝 절친"; color = "var(--info-color)"; }

                const relCard = document.createElement('div');
                relCard.className = 'char-card';
                relCard.style.borderLeftColor = color;
                relCard.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.9em;">${getPsychEmoji(charA)}${charA.name} (${charA.mbti}) ↔ ${getPsychEmoji(charB)}${charB.name} (${charB.mbti})</span>
                        <span style="font-weight:bold; color:${color};">${trustVal}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:0.75em; margin-top:5px;">
                        <span style="color:#777;">궁합 지수: ${mbtiScore}</span>
                        <span style="color:${color}; opacity:0.8;">${statusText}</span>
                    </div>
                `;
                relBoard.appendChild(relCard);
            }
        }
    }

    async function triggerSynergyEvent(char) {
        // MBTI 궁합이 25점 이상(지표 3개 이상 일치)인 파트너 찾기
        const partner = characters.find(other => 
            other.id !== char.id && 
            other.states.status === 'alive' && 
            calculateMbtiCompatibilityScore(char.mbti, other.mbti) >= 25
        );

        if (partner && Math.random() < 0.2) {
            log(`<div class="log-entry system" style="background: rgba(46, 213, 115, 0.1); border-left: 4px solid var(--success-color);">
                <span class="log-char-name">✨ 찰떡궁합: ${char.name} & ${partner.name}</span>
                <div class="log-situation">성격이 잘 맞는 두 사람이 완벽한 시너지를 발휘하여 서로를 격려했다.</div>
                <div class="log-dialogue">"역시 우린 통하는 게 있네. 네가 옆에 있어서 든든해."</div>
            </div>`);
            char.states.fear = Math.max(0, char.states.fear - 10);
            partner.states.fear = Math.max(0, partner.states.fear - 10);
            char.trust[partner.id] = Math.min(100, (char.trust[partner.id] || 50) + 5);
            partner.trust[char.id] = Math.min(100, (partner.trust[char.id] || 50) + 5);
            await sleep(300);
        }
    }

    async function processDay() {
        if (!gameActive || SoundManager.isProcessing) return;
        SoundManager.isProcessing = true;
        const nextBtn = document.getElementById('nextDayBtn');
        nextBtn.disabled = true;

        let livingCount = characters.filter(c => c.states.status === 'alive').length;
        if (livingCount === 0) {
            finishGame();
            return;
        }

        SoundManager.playDayChange(); // 하루가 지날 때마다 효과음 재생
        log(`<div class="log-day-tag">📅 DAY ${currentDay}</div>`);
        await sleep(500);

        for (let char of characters) {
            if (char.states.status !== 'alive') continue;

            // 현재 처리 중인 캐릭터의 공포도를 사운드 매니저에 동기화
            SoundManager.currentFear = char.states.fear;

            // 1. 상태 악화
            // 장기 효과 턴 감소 및 처리
            char.effects = char.effects.filter(effect => {
                effect.duration--;
                if (effect.duration > 0) return true;
                log(`<div class="log-entry system" style="font-size:0.8em; border:none; background:transparent;">✨ ${char.name}의 [${effect.name}] 상태가 해제되었다.</div>`);
                return false;
            });

            const randomHPLoss = Math.floor(Math.random() * 3); // 0~2 랜덤 체력 감소 (완화)
            char.states.hp -= randomHPLoss;

            char.states.hunger += (10 - char.stats['인내력'] * 0.5); // 허기 증가폭 감소
            char.states.thirst += 10; // 갈증 증가폭 감소
            char.states.fatigue += (10 - char.stats['체력'] * 0.5);
            if (char.states.infection > 0) char.states.infection += 5;

            // 임계값 체크 및 패널티 대폭 완화
            if (char.states.hunger > 95) char.states.hp -= 2;
            if (char.states.thirst > 95) char.states.hp -= 3;

            // 2. 이벤트 발생
            updateStatusBoard();
            await triggerSynergyEvent(char);
            await generateEvent(char);
            updateStatusBoard();

            // 3. 생존 체크
            if (char.states.hp <= 0) {
                char.states.status = 'dead';
                await sleep(200);
                log(`<div class="log-entry" style="border-left-color: #000; background: #331111;">
                    <span class="log-char-name">${char.name}</span>
                    <div class="log-result" style="color: var(--accent-color);">💀 체력 고갈로 인해 사망했다.</div>
                </div>`);
                await sleep(200);
            } else if (char.states.infection >= 100) {
                char.states.status = 'zombie';
                await sleep(200);
                log(`<div class="log-entry" style="border-left-color: #2ecc71; background: #112211;">
                    <span class="log-char-name">${char.name}</span>
                    <div class="log-result" style="color: #2ecc71;">🤮 바이러스가 뇌를 장악했다. 좀비로 변했다.</div>
                </div>`);
                await sleep(200);
            }

            await sleep(400);
        }

        updateStatusBoard();
        checkGameEnd();
        currentDay++;
        
        SoundManager.isProcessing = false;
        nextBtn.disabled = false;
    }

    async function generateEvent(char) {
        const eventTypes = ['search', 'zombie', 'conflict', 'rest', 'move', 'coop', 'hazard'];
        const rand = Math.random() * 100;
        let type = '';

        // 환경 보정된 이벤트 확률
        const zombieProb = 20 + selectedLoc.zombieMod + difficultyMod;
        if (rand < zombieProb) type = 'zombie';
        else if (rand < zombieProb + 30) type = 'search';
        else if (rand < zombieProb + 40) type = 'conflict';
        else if (rand < zombieProb + 55) type = 'move';
        else if (rand < zombieProb + 70) type = 'coop';
        else if (rand < zombieProb + 85) type = 'hazard';
        else type = 'rest';

        const room = selectedLoc.rooms[Math.floor(Math.random() * selectedLoc.rooms.length)];
        
        const entry = log(`<div class="log-entry ${type}"><span class="log-char-name">${char.name}</span></div>`);
        await sleep(300);

        switch(type) {
            case 'zombie':
                SoundManager.playAlert();
                const det = calculateProbability('detect', char, selectedLoc);
                entry.innerHTML += `<div class="log-situation">🧟 ${room}에서 좀비 무리와 마주쳤다! 은신 및 도주를 시도했다.</div>`;
                entry.innerHTML += `<div class="log-dialogue">${getDialogue('combat', char)}</div>`;
                await sleep(400);
                if (Math.random() * 100 < det.successChance) {
                    SoundManager.playSuccess();
                    entry.innerHTML += `<div class="log-result" style="color: var(--success-color);">🏃 발소리를 죽여 무사히 탈출했다. (성공)</div>`;
                    char.states.fear += 10;
                } else {
                    const com = calculateProbability('combat', char, selectedLoc);
                    entry.innerHTML += `<div class="log-situation" style="color: var(--accent-color);">⚠️ 발각되었다! 강제 전투에 돌입했다.</div>`;
                    entry.innerHTML += `<div class="log-dialogue">${getDialogue('combat', char)}</div>`;
                    if (entry.innerHTML.includes('원수 방해')) entry.innerHTML += `<div style="font-size:0.8em; color:#e74c3c;">(분대 내 원수의 비협조가 치명적이었다!)</div>`;
                    await sleep(500);
                    if (Math.random() * 100 < com.successChance) {
                        SoundManager.playSuccess();
                        entry.innerHTML += `<div class="log-result" style="color: var(--info-color);">⚔️ 사투 끝에 좀비를 쓰러뜨렸다.</div>`;
                        char.states.hp -= 10;
                        char.states.fatigue += 20;
                    } else {
                        SoundManager.playAlert();
                        entry.innerHTML += `<div class="log-result" style="color: var(--accent-color);">🩸 물리고 뜯기며 간신히 도망쳤다. (참패)</div>`;
                        entry.innerHTML += `<div class="log-dialogue" style="color:var(--accent-color);">${getDialogue('injury', char)}</div>`;
                        char.states.hp -= 30;
                        // 장기 효과: 부상 부여
                        if (!char.effects.some(e => e.name === "골절 부상")) {
                            const dur = applyEffect(char, "골절 부상", 3, "all", -15);
                            entry.innerHTML += `<div style="color:#e67e22; font-size:0.9em;">⚠️ 심각한 골절상을 입었다. (${dur}일간 모든 효율 감소)</div>`;
                        }
                        const inf = calculateProbability('infection', char, selectedLoc);
                        if (Math.random() * 100 < inf.successChance) {
                            char.states.infection += 20;
                            entry.innerHTML += `<div class="log-result" style="color: #9b59b6;">☣️ 상처를 통해 바이러스가 침투했다!</div>`;
                        }
                    }
                }
                break;

            case 'search':
                entry.innerHTML += `<div class="log-situation">🔍 ${room}의 쓰레기 더미를 뒤지며 보급품을 찾았다.</div>`;
                entry.innerHTML += `<div class="log-dialogue">${getDialogue('search', char)}</div>`;
                await sleep(400);
                const searchSkill = (char.stats['지능'] + char.stats['시력']) * 5;
                if (Math.random() * 100 < searchSkill + selectedLoc.foodMod) {
                    SoundManager.playSuccess();
                    if (Math.random() * 100 < 15) { // 15% 확률로 구급상자 발견
                        entry.innerHTML += `<div class="log-result" style="color: #f1c40f;">🩹 구급 상자를 발견했다! 모든 부상을 치료하고 체력을 회복했다.</div>`;
                        char.states.hp = Math.min(100, char.states.hp + 40);
                        char.effects = char.effects.filter(e => e.name !== "골절 부상");
                    } else {
                        entry.innerHTML += `<div class="log-result" style="color: var(--info-color);">🍎 깨끗한 물과 통조림을 발견했다!</div>`;
                        char.states.hunger = Math.max(0, char.states.hunger - 40);
                        char.states.thirst = Math.max(0, char.states.thirst - 50);
                    }
                } else {
                    if (Math.random() * 100 < 20) { // 20% 확률로 식중독
                        const dur = applyEffect(char, "식중독", 2, "all", -10);
                        entry.innerHTML += `<div class="log-result" style="color:#e67e22;">🤢 상한 음식을 잘못 먹어 탈이 났다. (${dur}일간 컨디션 난조)</div>`;
                    } else {
                        entry.innerHTML += `<div class="log-result">🏚️ 먼지만 가득할 뿐 아무것도 없었다.</div>`;
                    }
                    char.states.fatigue += 5;
                }
                break;

            case 'conflict':
                const others = characters.filter(c => c.id !== char.id && c.states.status === 'alive');
                if (others.length > 0) {
                    const target = others[Math.floor(Math.random() * others.length)];
                    entry.innerHTML += `<div class="log-situation">💢 식량 배분 문제로 ${target.name}와(과) 언쟁을 벌였다.</div>`;
                    entry.innerHTML += `<div class="log-dialogue">${getDialogue('conflict', char)}</div>`;
                    await sleep(400);
                    const con = calculateProbability('conflict', char, selectedLoc);
                    if (Math.random() * 100 < con.successChance) {
                        SoundManager.playSuccess();
                        entry.innerHTML += `<div class="log-result" style="color: var(--success-color);">🤝 원만하게 합의하여 신뢰를 쌓았다.</div>`;
                        char.trust[target.id] += 10;
                        target.trust[char.id] += 10;
                    } else {
                        SoundManager.playAlert();
                        entry.innerHTML += `<div class="log-result" style="color: var(--accent-color);">🗯️ 서로에게 상처만 남긴 채 돌아섰다.</div>`;
                        char.trust[target.id] -= 20;
                        target.trust[char.id] -= 20;
                        // 장기 효과: 트라우마
                        if (char.states.fear > 50) {
                            const dur = applyEffect(char, "정신적 충격", 4, "conflict", -20);
                            entry.innerHTML += `<div style="color:#e67e22; font-size:0.9em;">🧠 대인 관계에 대한 깊은 트라우마가 생겼다. (${dur}일간 지속)</div>`;
                        }
                    }
                } else {
                    entry.innerHTML += `<div class="log-situation">🌑 정적만이 감도는 곳에서 고독감에 휩싸였다.</div>`;
                    char.states.fear += 15;
                }
                break;

            case 'move':
                entry.innerHTML += `<div class="log-situation">🏃 거점을 옮기기 위해 ${room} 지역을 통과했다.</div>`;
                await sleep(500);
                const esc = calculateProbability('escape', char, selectedLoc);
                if (Math.random() * 100 < (esc.successChance * 0.2)) {
                    SoundManager.playSuccess();
                    entry.innerHTML += `<div class="log-result" style="color: #f1c40f; font-size: 1.2em;">🚁 탈출 경로를 확보했다! 봉쇄 구역을 벗어났다!</div>`;
                    char.states.status = 'escaped';
                } else {
                    entry.innerHTML += `<div class="log-result">💨 다행히 적의 시선을 피해 자리를 옮겼다.</div>`;
                    char.states.fatigue += 10;
                }
                break;

            case 'coop':
                const friend = characters.filter(c => c.id !== char.id && c.states.status === 'alive')[0];
                if (friend) {
                    entry.innerHTML += `<div class="log-situation">🤝 ${friend.name}와(과) 함께 대화를 나누며 잠시 휴식을 취했다.</div>`;
                    entry.innerHTML += `<div class="log-dialogue">${getDialogue('bonding', char)}</div>`;
                    await sleep(400);
                    char.states.fear = Math.max(0, char.states.fear - 20);
                    char.trust[friend.id] += 15;
                    friend.trust[char.id] += 15;
                    entry.innerHTML += `<div class="log-result" style="color:var(--success-color);">둘 사이의 유대감이 깊어지고 공포가 사라졌다.</div>`;
                } else {
                    entry.innerHTML += `<div class="log-situation">💤 혼자서 조용히 지난날을 회상했다.</div>`;
                    char.states.fatigue = Math.max(0, char.states.fatigue - 10);
                }
                break;

            case 'hazard':
                entry.innerHTML += `<div class="log-situation">☢️ 아차! ${room}의 바닥이 무너지며 추락할 위기에 처했다.</div>`;
                await sleep(500);
                const reflex = calculateProbability('escape', char, selectedLoc);
                if (Math.random() * 100 < reflex.successChance) {
                    SoundManager.playSuccess();
                    entry.innerHTML += `<div class="log-result" style="color:var(--success-color);">🤸 반사적으로 근처 구조물을 붙잡아 살아남았다.</div>`;
                } else {
                    SoundManager.playAlert();
                    entry.innerHTML += `<div class="log-result" style="color:var(--accent-color);">😖 바닥에 세게 부딪히며 타박상을 입었다.</div>`;
                    char.states.hp -= 15;
                    char.states.fatigue += 10;
                }
                break;

            case 'rest':
                entry.innerHTML += `<div class="log-situation">💤 무너진 벽 뒤에서 잠시 눈을 붙였다.</div>`;
                await sleep(500);
                SoundManager.playSuccess();
                char.states.hp = Math.min(100, char.states.hp + 5); // 휴식 시 체력 5 회복
                char.states.fatigue = Math.max(0, char.states.fatigue - 30);
                char.states.fear = Math.max(0, char.states.fear - 10);
                entry.innerHTML += `<div class="log-result" style="color: var(--success-color);">🧘 기력을 일부 회복했다.</div>`;
                break;
        }
    }

    function checkGameEnd() {
        const total = characters.length;
        const dead = characters.filter(c => c.states.status === 'dead').length;
        const zombie = characters.filter(c => c.states.status === 'zombie').length;
        const escaped = characters.filter(c => c.states.status === 'escaped').length;

        if (dead + zombie + escaped === total) {
            finishGame();
        }
        SoundManager.stopHeartbeat(); // 게임 종료 시 심장 박동 정지
    }

    function finishGame() {
        gameActive = false;
        document.getElementById('nextDayBtn').classList.add('hidden');
        
        const survivors = characters.filter(c => c.states.status === 'alive').length;
        const dead = characters.filter(c => c.states.status === 'dead').length;
        const escaped = characters.filter(c => c.states.status === 'escaped').length;
        const zombie = characters.filter(c => c.states.status === 'zombie').length;

        let summary = `<div class="log-entry system" style="text-align: left; background: #222; border: 2px solid #f1c40f;">
            <div style="font-size: 1.5em; margin-bottom: 10px;">📊 최종 생존 기록</div>
            <div style="color: var(--success-color);">🚁 탈출 성공: ${escaped}명</div>
            <div style="color: #3498db;">🚶 이동 중: ${survivors}명</div>
            <div style="color: var(--accent-color);">💀 사망: ${dead}명</div>
            <div style="color: #2ecc71;">🧟 좀비화: ${zombie}명</div>
            <div style="margin-top: 10px; font-size: 0.9em; color: #888;">시뮬레이션 종료. 기록 보존됨.</div>
        </div>`;
        log(summary);
    }

    // 실행
    initStatsUI();
</script>

</body>
</html>
